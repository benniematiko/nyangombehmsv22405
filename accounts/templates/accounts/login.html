{% load static %}  
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagles Mission Hospital</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>




{% block content %}
<div class="login-wrapper">
    <div class="portal-card">
        <div class="portal-icon">🔐</div>
        <h1>Staff Portal Login</h1>
        <p class="tagline">Please authenticate with your official clinical credentials.</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autofocus required placeholder="e.g. dr_smith">
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">
                Sign In to System
            </button>
        </form>
    </div>
</div>
{% endblock %}
