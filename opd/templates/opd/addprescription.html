{% extends "base.html" %}
{% block title %}Add Prescription | Eagles Mission Hospital{% endblock %}
{% block content %}

<style>
    .prescription-container {
        max-width: 100%;
        margin: 0;          /* remove auto centering */
        padding: 0;         /* remove left/right padding */
    }
    
    .prescription-panel-header {
        background: #810810;
        border-bottom: 2px solid #6a0606;
        padding: 20px 25px;
        margin-bottom: 0;   /* flush against body */
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 0;   /* remove border-radius */
    }
    
    .prescription-panel-header h1 {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        margin: 0;
    }
    
    .prescription-panel-header h1 i {
        color: #fff;
        margin-right: 10px;
    }
    
    .prescription-panel-header .panel-subtitle {
        color: #fecdd3;
        font-size: 14px;
        margin: 5px 0 0 0;
    }

    .prescription-panel-header .close-btn {
        font-size: 28px;
        color: #fff;
        text-decoration: none;
        transition: color 0.2s ease;
        font-weight: 300;
        line-height: 1;
        opacity: 0.85;
    }

    .prescription-panel-header .close-btn:hover {
        color: #fff;
        opacity: 1;
    }
    
    .prescription-body {
        background: #fff;
        border: none;       /* remove border since we removed radius */
        border-radius: 0;
        overflow: hidden;
    }
    
    .prescription-grid {
        display: grid;
        grid-template-columns: 1fr 320px;  /* fixed right column, left takes rest */
        gap: 25px;
        padding: 25px;
        max-width: 1400px;          /* cap the total width */
        margin: 0 auto;             /* center it */
        box-sizing: border-box;
        width: 100%;
    }
    
    .prescription-section {
        border: 1px solid #e2e8f0;
        border-radius: 0;   /* remove section radius too */
        padding: 20px;
        background: #fafbfc;
        margin-bottom: 15px;
    }
        
    .prescription-section-title {
        font-size: 13px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid #e8c4c7;   /* thin + faint */
        padding-bottom: 8px;
        margin-bottom: 15px;
    }
    
    .form-group {
        margin-bottom: 15px;
    }
    
    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 5px;
    }
    
    .form-group label .required {
        color: #dc2626;
    }
    
    .form-control {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-size: 13px;
        transition: border-color 0.2s ease;
        box-sizing: border-box;
        background: #fff;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #810810;
        box-shadow: 0 0 0 3px rgba(129, 8, 16, 0.1);
    }
    
    textarea.form-control {
        resize: vertical;
        min-height: 60px;
        font-family: inherit;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }
    
    /* ── Clinical Findings - All on one row ── */
    .findings-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1.5fr 1fr;
        gap: 12px;
        align-items: end;
    }
    
    .findings-row .form-group {
        margin-bottom: 0;
    }
    
    .findings-row .form-group label {
        font-size: 11px;
        margin-bottom: 3px;
    }
    
    .findings-row .form-control {
        height: 34px;
        padding: 4px 8px;
        font-size: 12px;
    }
    
    .findings-row textarea.form-control {
        height: 34px;
        min-height: 34px;
        resize: none;
        padding: 4px 8px;
    }
    
    /* ── Medicine Details - FORCE HORIZONTAL ONLY ── */
    .medicine-row {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        gap: 8px;
        align-items: end;
        width: 100%;
    }
    
    .medicine-row .form-group {
        margin-bottom: 0;
        flex: 1; /* Automatically balance width between elements */
        min-width: 60px; /* Prevent shrinking out of existence */
    }
    
    /* Give name and category slightly more room on the single row */
    .medicine-row .form-group:nth-child(1),
    .medicine-row .form-group:nth-child(2) {
        flex: 1.5;
    }
    
    .medicine-row .form-group label {
        font-size: 10px;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    .medicine-row .form-control {
        height: 32px;
        padding: 3px 6px;
        font-size: 11px;
        border-radius: 0 !important; /* Removed border radius for inputs in this row */
    }
    
    .medicine-row select.form-control {
        padding: 2px 4px;
        font-size: 11px;
    }
    
    .checkbox-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 5px;
    }
    
    .checkbox-group label {
        display: flex;
        align-items: center;
        font-size: 13px;
        font-weight: 400;
        color: #475569;
        cursor: pointer;
        margin-bottom: 0;
    }
    
    .checkbox-group input[type="checkbox"] {
        margin-right: 8px;
        accent-color: #810810;
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    
    .btn-add-medicine {
        background: #f1f5f9;
        border: 1px dashed #cbd5e1;
        color: #475569;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
    }
    
    .btn-add-medicine:hover {
        background: #e2e8f0;
        border-color: #810810;
        color: #810810;
    }
    
    .btn-add-medicine i {
        font-size: 14px;
    }
    
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        padding: 15px 25px;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
    }
    
    .btn-primary {
        background: #810810;
        color: #fff;
        border: none;
        padding: 10px 30px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-primary:hover {
        background: #6a0606;
    }
    
    .btn-success {
        background: #059669;
        color: #fff;
        border: none;
        padding: 10px 30px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    .btn-success:hover {
        background: #047857;
    }
    
    @media (max-width: 1400px) {
        .medicine-row .form-group label {
            font-size: 9px;
        }
        
        .medicine-row .form-control {
            font-size: 10px;
            padding: 2px 4px;
            height: 28px;
        }
    }
    
    @media (max-width: 1200px) {
        .findings-row {
            grid-template-columns: 1fr 1fr;
        }
        /* Grid layouts disabled for medicine-row to preserve horizontal timeline */
    }
    
    @media (max-width: 1024px) {
        .prescription-grid {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .form-row {
            grid-template-columns: 1fr;
        }
        
        .checkbox-group {
            grid-template-columns: 1fr;
        }
        
        .findings-row {
            grid-template-columns: 1fr 1fr;
        }
    }
    
    @media (max-width: 768px) {
        .prescription-container {
            padding: 0 10px;
        }
        
        .prescription-grid {
            padding: 15px;
        }
        
        .form-actions {
            flex-direction: column;
        }
        
        .form-actions .btn-primary,
        .form-actions .btn-success {
            width: 100%;
            justify-content: center;
        }
        
        .findings-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="prescription-container">
    
    <div class="prescription-panel-header">
        <div class="panel-title-group">
            <h1><i class="fa fa-plus-square"></i> Add Prescription</h1>
            <p class="panel-subtitle">Create and manage prescriptions for OPD patients</p>
        </div>
        <a href="{% url 'opd:opd_home' %}" class="close-btn" title="Close">×</a>
    </div>

    <div class="prescription-body">
        
        <form method="POST" action="" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="visit_id" value="{{ visit.id }}">

            <div class="prescription-grid">
                
                <div>
                    <div class="form-group">
                        <label for="header_note">Header Note</label>
                        <textarea id="header_note" name="header_note" class="form-control" rows="2" placeholder="Enter header note..."></textarea>
                    </div>

                    <div class="prescription-section">
                        <div class="prescription-section-title">
                            <i class="fa fa-search" style="margin-right: 6px;"></i> Clinical Findings
                        </div>
                        
                        <div class="findings-row">
                            <div class="form-group">
                                <label for="finding_category">Category</label>
                                <select id="finding_category" name="finding_category" class="form-control">
                                    <option value="">Select</option>
                                    <option value="General">General</option>
                                    <option value="Cardiovascular">Cardiovascular</option>
                                    <option value="Respiratory">Respiratory</option>
                                    <option value="Gastrointestinal">Gastrointestinal</option>
                                    <option value="Neurological">Neurological</option>
                                    <option value="Musculoskeletal">Musculoskeletal</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="finding_list">Finding List</label>
                                <select id="finding_list" name="finding_list" class="form-control">
                                    <option value="">Select</option>
                                    <option value="Normal">Normal</option>
                                    <option value="Abnormal">Abnormal</option>
                                    <option value="Elevated">Elevated</option>
                                    <option value="Reduced">Reduced</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="finding_description">Description</label>
                                <input type="text" id="finding_description" name="finding_description" class="form-control" placeholder="Describe findings...">
                            </div>
                            
                            <div class="form-group">
                                <label for="finding_print">Print</label>
                                <input type="text" id="finding_print" name="finding_print" class="form-control" placeholder="Print details...">
                            </div>
                        </div>
                    </div>

                    <div class="prescription-section">
                        <div class="prescription-section-title">
                            <i class="fa fa-pills" style="margin-right: 6px;"></i> Medicine Details
                        </div>
                        
                        <div class="medicine-row">
                            <div class="form-group">
                                <label for="medicine_category">Category <span class="required">*</span></label>
                                <select id="medicine_category" name="medicine_category" class="form-control" required>
                                    <option value="">Select</option>
                                    <option value="Antibiotics">Antibiotics</option>
                                    <option value="Analgesics">Analgesics</option>
                                    <option value="Antihistamines">Antihistamines</option>
                                    <option value="Antihypertensives">Antihypertensives</option>
                                    <option value="Antidiabetics">Antidiabetics</option>
                                    <option value="Vitamins">Vitamins</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="medicine_name">Medicine <span class="required">*</span></label>
                                <select id="medicine_name" name="medicine_name" class="form-control" required>
                                    <option value="">Select</option>
                                    <option value="Amoxicillin">Amoxicillin</option>
                                    <option value="Paracetamol">Paracetamol</option>
                                    <option value="Ibuprofen">Ibuprofen</option>
                                    <option value="Cetirizine">Cetirizine</option>
                                    <option value="Amlodipine">Amlodipine</option>
                                    <option value="Metformin">Metformin</option>
                                    <option value="Vitamin C">Vitamin C</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="dose">Dose <span class="required">*</span></label>
                                <input type="text" id="dose" name="dose" class="form-control" placeholder="e.g., 1 tab" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="dose_interval">Interval <span class="required">*</span></label>
                                <input type="text" id="dose_interval" name="dose_interval" class="form-control" placeholder="Twice daily" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="dose_duration">Duration</label>
                                <input type="text" id="dose_duration" name="dose_duration" class="form-control" placeholder="5 days">
                            </div>
                            
                            <div class="form-group">
                                <label for="quantity">Qty <span class="required">*</span></label>
                                <input type="number" id="quantity" name="quantity" class="form-control" placeholder="1" min="1" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="instruction">Instruction</label>
                                <input type="text" id="instruction" name="instruction" class="form-control" placeholder="After meals">
                            </div>
                        </div>
                        
                        <button type="button" class="btn-add-medicine">
                            <i class="fa fa-plus"></i> Add More Medicine
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="attach_photo">Attach Photo</label>
                        <input type="file" id="attach_photo" name="attach_photo" class="form-control" style="padding: 6px;">
                    </div>

                    <div class="form-group">
                        <label for="foot_note">Foot Note</label>
                        <textarea id="foot_note" name="foot_note" class="form-control" rows="2" placeholder="Enter foot note..."></textarea>
                    </div>
                </div>

                <div>
                    <div class="form-group">
                        <label for="laboratory">Laboratory</label>
                        <textarea id="laboratory" name="laboratory" class="form-control" rows="4" placeholder="Enter laboratory investigations..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="radiology">Radiology</label>
                        <textarea id="radiology" name="radiology" class="form-control" rows="4" placeholder="Enter radiology investigations..."></textarea>
                    </div>

                    <div class="prescription-section">
                        <div class="prescription-section-title">
                            <i class="fa fa-bell" style="margin-right: 6px;"></i> Notification To
                        </div>
                        
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" name="notify_to" value="Admin"> Admin
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Accountant"> Accountant
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Pharmacist" checked> Pharmacist
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Pathologist"> Pathologist
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Radiology"> Radiology
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Super Admin"> Super Admin
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Receptionist"> Receptionist
                            </label>
                            <label>
                                <input type="checkbox" name="notify_to" value="Nurse"> Nurse
                            </label>
                        </div>
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" name="action" value="save_print" class="btn-primary">
                    <i class="fa fa-print"></i> Save &amp; Print
                </button>
                <button type="submit" class="btn-success">
                    <i class="fa fa-floppy-disk"></i> Save
                </button>
            </div>

        </form>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {

        // ── Remove sidebar ──
        const grid = document.querySelector('.grid');
        if (grid) grid.classList.add('full-canvas-view');

        // Add Medicine button placeholder
        const addMedicineBtn = document.querySelector('.btn-add-medicine');
        if (addMedicineBtn) {
            addMedicineBtn.addEventListener('click', function() {
                alert('Add more medicine functionality - dynamic form fields logic here.');
            });
        }

        // Auto-hide alerts if any
        const alerts = document.querySelectorAll('.alert-message.show');
        alerts.forEach(function(alert) {
            setTimeout(function() {
                alert.classList.remove('show');
            }, 5000);
        });
    });
</script>

{% endblock %}
