{% extends "base.html" %}
{% block title %} Edit Department | Eagles Mission Hospital{% endblock %}

{% block content %}
<style>
  .edit-container {
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  .edit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #990000;
    padding-bottom: 12px;
  }

  .edit-header h1 {
    color: #990000;
    margin: 0;
    font-size: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 4px;
    font-size: 13px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 0px !important;
    font-size: 13px;
    box-sizing: border-box;
  }

  .btn-save {
    background: #990000;
    color: #fff;
    border: none;
    padding: 8px 24px;
    cursor: pointer;
    font-weight: 600;
  }

  .btn-save:hover {
    background: #800000;
  }

  .btn-back {
    background: #6c757d;
    color: #fff;
    border: none;
    padding: 8px 16px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
  }

  .btn-back:hover {
    background: #5a6268;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
</style>

<div class="edit-container">
  <div class="edit-header">
    <h1><i class="fa fa-edit"></i> Edit Department</h1>
    <a href="{% url 'setup:department_list' %}" class="btn-back"><i class="fa fa-arrow-left"></i> Back</a>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label>Department Name *</label>
      <input type="text" name="name" value="{{ department.name }}" required>
    </div>
    <div class="form-group">
      <label>Department Code *</label>
      <input type="text" name="code" value="{{ department.code }}" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="3">{{ department.description }}</textarea>
    </div>
    <div class="form-group">
      <label>
        <input type="checkbox" name="is_active" {% if department.is_active %}checked{% endif %}>
        Active
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fa fa-save"></i> Update</button>
      <a href="{% url 'setup:department_list' %}" class="btn-back">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
