{% extends "base.html" %}
{% block title %} Hospital Settings | Eagles Mission Hospital{% endblock %}

{% block content %}
<style>
  .settings-container {
    padding: 20px;
    width: 100%; /* Takes full container width */
    box-sizing: border-box;
  }

  .settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #990000;
    padding-bottom: 12px;
  }

  .settings-header h1 {
    color: #990000;
    margin: 0;
    font-size: 24px;
  }

  .settings-header h1 i {
    margin-right: 10px;
  }

  .settings-form {
    background: #fff;
    padding: 24px;
    border: 1px solid #e2e8f0;
    width: 100%;
    box-sizing: border-box;
    
    /* Configures inner layouts to adapt across massive widths */
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group {
    margin: 0;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 0px !important;
    font-size: 13px;
    box-sizing: border-box;
    background-color: #fff;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  /* Optimized Grid structures for full-width view scaling */
  .grid-3-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .grid-2-cols {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  .btn-save {
    background: #990000;
    color: #fff;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }

  .btn-save:hover {
    background: #800000;
  }

  .btn-back {
    background: #6c757d;
    color: #fff;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    font-size: 13px;
  }

  .btn-back:hover {
    background: #5a6268;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    border-top: 1px solid #f1f5f9;
    padding-top: 20px;
  }

  /* Responsive breakpoints down to tablets and mobile layouts */
  @media (max-width: 1024px) {
    .grid-3-cols {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .grid-3-cols,
    .grid-2-cols {
      grid-template-columns: 1fr;
    }
    
    .settings-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    
    .settings-header .btn-back {
      width: 100%;
      text-align: center;
    }
  }
</style>

<div class="settings-container">
  <div class="settings-header">
    <h1><i class="fa fa-hospital-o"></i> Hospital Settings</h1>
    <a href="{% url 'setup:setup_home' %}" class="btn-back">
      <i class="fa fa-arrow-left"></i> Back
    </a>
  </div>

  <form method="POST" enctype="multipart/form-data" class="settings-form">
    {% csrf_token %}
    
    <!-- Row 1: Hospital Base Information -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>Hospital Name *</label>
        <input type="text" name="hospital_name" value="{{ settings.hospital_name|default:'Eagles Mission Hospital' }}" required>
      </div>
      <div class="form-group">
        <label>Hospital Code</label>
        <input type="text" name="hospital_code" value="{{ settings.hospital_code|default:'' }}" placeholder="e.g., EMH">
      </div>
      <div class="form-group">
        <label>Registration Number</label>
        <input type="text" name="registration_number" value="{{ settings.registration_number|default:'' }}" placeholder="e.g., REG-001">
      </div>
    </div>

    <!-- Row 2: Location/Address -->
    <div class="form-group">
      <label>Address</label>
      <textarea name="address" rows="3">{{ settings.address|default:'' }}</textarea>
    </div>

    <!-- Row 3: Communication Lines -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" value="{{ settings.phone|default:'' }}" placeholder="+254 700 123456">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ settings.email|default:'' }}" placeholder="info@hospital.com">
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website" value="{{ settings.website|default:'' }}" placeholder="https://www.hospital.com">
      </div>
    </div>

    <!-- Row 4: Regional Setup Parameters -->
    <div class="grid-2-cols">
      <div class="form-group">
        <label>Currency Symbol</label>
        <input type="text" name="currency_symbol" value="{{ settings.currency_symbol|default:'Kshs' }}" placeholder="Kshs">
      </div>
      <div class="form-group">
        <label>Date Format</label>
        <select name="date_format">
          <option value="d/m/Y" {% if settings.date_format == 'd/m/Y' %}selected{% endif %}>DD/MM/YYYY</option>
          <option value="m/d/Y" {% if settings.date_format == 'm/d/Y' %}selected{% endif %}>MM/DD/YYYY</option>
          <option value="Y-m-d" {% if settings.date_format == 'Y-m-d' %}selected{% endif %}>YYYY-MM-DD</option>
        </select>
      </div>
    </div>

    <!-- Row 5: Media Upload -->
    <div class="form-group">
      <label>Hospital Logo</label>
      <input type="file" name="logo" accept="image/*">
      {% if settings.logo %}
        <p style="margin-top:8px; font-size:12px; color:#64748b;">
          Current: <img src="{{ settings.logo.url }}" style="max-height:50px; vertical-align:middle; margin-left:8px;">
        </p>
      {% endif %}
    </div>

    <!-- Actions block -->
    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fa fa-save"></i> Save Settings</button>
      <a href="{% url 'setup:setup_home' %}" class="btn-back">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
