{% extends "base.html" %}
{% block title %}{{ title }} | Setup | Eagles Mission Hospital{% endblock %}

{% block content %}
<style>
  .form-container { padding: 20px; max-width: 600px; margin: 0 auto; }
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #990000; padding-bottom: 12px; }
  .form-header h1 { color: #990000; margin: 0; font-size: 24px; }
  .form-header h1 i { margin-right: 10px; }
  .btn-back { background: #6c757d; color: #fff; border: none; padding: 8px 16px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
  .btn-back:hover { background: #5a6268; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-weight: 600; color: #4a5568; margin-bottom: 4px; font-size: 13px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 0; font-size: 13px; box-sizing: border-box; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { background: #990000; color: #fff; border: none; padding: 10px 30px; cursor: pointer; font-weight: 600; }
  .btn-save:hover { background: #800000; }
  .btn-cancel { background: #6c757d; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
  .btn-cancel:hover { background: #5a6268; }
  .checkbox-group { display: flex; align-items: center; gap: 8px; }
  .checkbox-group input { width: auto; }
  .checkbox-group label { margin: 0; }
</style>

<div class="form-container">
  <div class="form-header">
    <h1><i class="fa fa-cubes"></i> {{ title }}</h1>
    <a href="
      {% if 'category' in request.resolver_match.url_name %}
        {% url 'setup:pharmacy_categories' %}
      {% elif 'group' in request.resolver_match.url_name %}
        {% url 'setup:pharmacy_groups' %}
      {% elif 'composition' in request.resolver_match.url_name %}
        {% url 'setup:pharmacy_compositions' %}
      {% endif %}
    " class="btn-back"><i class="fa fa-arrow-left"></i> Back</a>
  </div>

  <form method="POST">
    {% csrf_token %}
    
    <div class="form-group">
      <label>Name <span style="color:#e53e3e;">*</span></label>
      <input type="text" name="name" value="{{ item.name|default:'' }}" required placeholder="Enter name...">
    </div>
    
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="3" placeholder="Enter description...">{{ item.description|default:'' }}</textarea>
    </div>
    
    {% if is_edit %}
    <div class="form-group checkbox-group">
      <input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}>
      <label>Active</label>
    </div>
    {% endif %}
    
    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fa fa-save"></i> Save</button>
      <a href="
        {% if 'category' in request.resolver_match.url_name %}
          {% url 'setup:pharmacy_categories' %}
        {% elif 'group' in request.resolver_match.url_name %}
          {% url 'setup:pharmacy_groups' %}
        {% elif 'composition' in request.resolver_match.url_name %}
          {% url 'setup:pharmacy_compositions' %}
        {% endif %}
      " class="btn-cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
