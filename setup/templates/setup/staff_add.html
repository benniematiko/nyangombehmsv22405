{% extends "base.html" %}
{% block title %} Add Staff | Eagles Mission Hospital{% endblock %}

{% block content %}
<style>
  .staff-container {
    padding: 20px;
    width: 100%; /* Uses full container workspace width */
    box-sizing: border-box;
  }

  .staff-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #990000;
    padding-bottom: 12px;
  }

  .staff-header h1 {
    color: #990000;
    margin: 0;
    font-size: 24px;
  }

  .staff-header h1 i {
    margin-right: 10px;
  }

  .staff-form {
    background: #fff;
    padding: 24px;
    border: 1px solid #e2e8f0;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .form-group {
    margin-bottom: 0; /* Handled uniformly by layout grid layouts */
  }

  .form-group label {
    display: block;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 0px !important;
    font-size: 13px;
    box-sizing: border-box;
    background-color: #fff;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 60px;
  }

  /* Structural layouts for balanced multi-column widths */
  .grid-3-cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .grid-2-cols {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  .btn-save {
    background: #990000;
    color: #fff;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }

  .btn-save:hover {
    background: #800000;
  }

  .btn-back {
    background: #6c757d;
    color: #fff;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    font-size: 13px;
  }

  .btn-back:hover {
    background: #5a6268;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    border-top: 1px solid #e2e8f0;
    padding-top: 20px;
  }

  @media (max-width: 1024px) {
    .grid-3-cols {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .grid-3-cols,
    .grid-2-cols {
      grid-template-columns: 1fr;
    }

    .staff-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .staff-header .btn-back {
      width: 100%;
      text-align: center;
    }
  }
</style>

<div class="staff-container">
  <div class="staff-header">
    <h1><i class="fa fa-user-plus"></i> Add Staff</h1>
    <a href="{% url 'setup:staff_list' %}" class="btn-back"><i class="fa fa-arrow-left"></i> Back</a>
  </div>

  <form method="POST" enctype="multipart/form-data" class="staff-form">
    {% csrf_token %}
    
    <!-- Row 1: Account Parameters -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>Username *</label>
        <input type="text" name="username" required placeholder="e.g., jdoe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="john@hospital.com">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" name="password" required placeholder="Minimum 8 characters">
      </div>
    </div>

    <!-- Row 2: Personal Identification -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" name="first_name" required placeholder="John">
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" name="last_name" required placeholder="Doe">
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select name="gender">
          <option value="">Select...</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <!-- Row 3: Organizational Allocations -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>Employee ID *</label>
        <input type="text" name="employee_id" required placeholder="EMP-001">
      </div>
      <div class="form-group">
        <label>Staff Type *</label>
        <select name="staff_type" required>
          <option value="">Select...</option>
          <option value="Doctor">Doctor</option>
          <option value="Nurse">Nurse</option>
          <option value="Receptionist">Receptionist</option>
          <option value="Laboratory Technician">Laboratory Technician</option>
          <option value="Radiologist">Radiologist</option>
          <option value="Pharmacist">Pharmacist</option>
          <option value="Administrator">Administrator</option>
          <option value="Accountant">Accountant</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Department</label>
        <select name="department">
          <option value="">Select...</option>
          {% for dept in departments %}
          <option value="{{ dept.id }}">{{ dept.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Row 4: Roles & HR Metrics -->
    <div class="grid-3-cols">
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="">Select...</option>
          {% for role in roles %}
          <option value="{{ role.id }}">{{ role.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="date_of_birth">
      </div>
      <div class="form-group">
        <label>Date of Joining</label>
        <input type="date" name="date_of_joining" value="{% now 'Y-m-d' %}">
      </div>
    </div>

    <!-- Row 5: Primary Contact Fields -->
    <div class="grid-2-cols">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" placeholder="0712345678">
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea name="address" rows="1" placeholder="Physical address..."></textarea>
      </div>
    </div>

    <!-- Row 6: Emergency Context -->
    <div class="grid-2-cols">
      <div class="form-group">
        <label>Emergency Contact Name</label>
        <input type="text" name="emergency_contact_name" placeholder="Jane Doe">
      </div>
      <div class="form-group">
        <label>Emergency Contact Phone</label>
        <input type="text" name="emergency_contact" placeholder="0712345678">
      </div>
    </div>

    <!-- Actions block -->
    <div class="form-actions">
      <button type="submit" class="btn-save"><i class="fa fa-save"></i> Save Staff</button>
      <a href="{% url 'setup:staff_list' %}" class="btn-back">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
